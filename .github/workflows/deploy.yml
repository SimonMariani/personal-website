# @format

name: Deploy code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: api
        run: pytest

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  update-maintenance-pages:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy frontend maintenance page to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: maintenance/frontend/*
          target: /home/nginx/maintenance/simonmariani.com/
          strip_components: 2

      - name: Copy api maintenance page to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: maintenance/api/*
          target: /home/nginx/maintenance/api.simonmariani.com/
          strip_components: 2

  deploy-production:
    needs: [test-backend, test-frontend, update-maintenance-pages]
    runs-on: ubuntu-latest
    steps:
      - name: ssh into remote server and setup changes
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/applications/personal-website/
            git fetch origin
            git reset --hard origin/main
            make stop-prod
            make start-prod
            docker system prune -f

  smoke-test:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Check website availability
        run: |
          URL="https://simonmariani.com/"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)

          if [ "$STATUS" -ne 200 ]; then
            echo "Website is down! Status code: $STATUS"
            exit 1
          else
            echo "Website is up! Status code: $STATUS"
          fi

      - name: Check api availability
        run: |
          URL="https://api.simonmariani.com/ping/"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)

          if [ "$STATUS" -ne 200 ]; then
            echo " Website is down! Status code: $STATUS"
            exit 1
          else
            echo "Website is up! Status code: $STATUS"
          fi

      - name: Check API answer availability
        run: |
          URL="https://api.simonmariani.com/answer/"
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")
          BODY=$(cat <<EOF
          {
              "message": {
                  "sender": "user",
                  "text": "test",
                  "timestamp": "$CURRENT_TIME"
              },
              "previousMessages": [
                  {
                      "sender": "user",
                      "text": "test",
                      "timestamp": "$CURRENT_TIME"
                  }
              ]
          }
          EOF
          )

          echo "Sending POST request to $URL..."
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat response.txt

          if [ "$RESPONSE" -ne 200 ]; then
            echo "API returned non-200 status ($RESPONSE)"
            exit 1
          fi

          if ! grep -q '"response"' response.txt; then
            echo "API response did not contain the expected key 'response'"
            exit 1
          fi

          echo -e "\nAPI health check passed!"


      