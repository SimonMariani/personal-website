# @format

name: Deploy code

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Don't run overlapping deploys; let an in-flight one finish.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # buildx + COMPOSE_BAKE below enable the GitHub Actions layer cache.
      - uses: docker/setup-buildx-action@v3

      # Real OpenAI key so the /answer/ check works; dummy Postgres creds.
      - name: Create .env
        run: |
          cat > .env <<EOF
          OPENAIKEY=${{ secrets.OPENAIKEY }}
          POSTGRES_USER=test
          POSTGRES_PASSWORD=test
          POSTGRES_DB=test
          EOF

      - name: Build and start the stack
        env:
          COMPOSE_BAKE: "true"
        run: make start-ci

      - name: Smoke test
        uses: ./.github/actions/smoke-test
        with:
          website-url: http://localhost:8080
          api-url: http://localhost:8000

      - name: Sync test
        uses: ./.github/actions/sync-test

      - name: Print logs on failure
        if: failure()
        run: make logs-ci

      - name: Tear down
        if: always()
        run: make stop-ci

  deploy-production:
    needs: [build-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: ssh into remote server and setup changes
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Pull the latest code from the main branch and reset the working tree to match it.
            cd /home/applications/personal-website/
            git fetch origin
            git reset --hard origin/main

            # Copy the just-pulled maintenance pages into place before downtime.
            mkdir -p /home/nginx/maintenance/simonmariani.com/ /home/nginx/maintenance/api.simonmariani.com/
            cp -r maintenance/frontend/* /home/nginx/maintenance/simonmariani.com/
            cp -r maintenance/api/* /home/nginx/maintenance/api.simonmariani.com/

            # Stop the stack, start it again, and prune old images to save disk space.
            make stop-prod
            make start-prod
            docker system prune -f

  smoke-test:
    needs: deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test
        uses: ./.github/actions/smoke-test
        with:
          website-url: https://simonmariani.com
          api-url: https://api.simonmariani.com
