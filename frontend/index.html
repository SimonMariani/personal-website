<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <!-- Meta information -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Import the font, we are using Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet" />

    <!-- Website title and SEO -->
    <title>Simon Mariani - Software & AI Engineer</title>
    <meta
      name="description"
      content="The personal site of Simon Mariani, a software and AI engineer. Ask the chat anything about his experience, tech stack and projects, or get in touch."
    />
    <link rel="canonical" href="https://simonmariani.com/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, ...) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://simonmariani.com/" />
    <meta property="og:title" content="Simon Mariani - Software & AI Engineer" />
    <meta
      property="og:description"
      content="The personal site of Simon Mariani, a software and AI engineer. Ask the chat anything about his experience, tech stack and projects, or get in touch."
    />
    <!-- NOTE replace with a 1200x630 PNG for the best social previews; most platforms do not render SVG og:image -->
    <meta property="og:image" content="https://simonmariani.com/favicon.svg" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Simon Mariani - Software & AI Engineer" />
    <meta
      name="twitter:description"
      content="The personal site of Simon Mariani, a software and AI engineer. Ask the chat anything about his experience, tech stack and projects, or get in touch."
    />
    <meta name="twitter:image" content="https://simonmariani.com/favicon.svg" />

    <!-- Cloudflare Web Analytics -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "20165a43045240299db64db534644e54"}'></script>
    <!-- End Cloudflare Web Analytics -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
